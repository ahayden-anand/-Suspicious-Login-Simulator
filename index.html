<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspicious Login Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Suspicious Login Simulator</h1>
            <p class="subtitle">Let's see if you can fool the security system...</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="user@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Login (If You Dare)</button>
            </form>

            <div id="message" class="message"></div>
                <p style="margin-top: 15px; font-size: 12px; color: #999;">⚠️ Try logging in from different browsers to trigger the drama!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
